name: Build arm64 Debug

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build arm64 Debug
        run: |
          cd V2rayNG
          chmod +x ./gradlew
          ./gradlew clean
          ./gradlew assembleDebug -PabiFilter=arm64-v8a --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: V2RayNG-Debug-arm64
          path: V2rayNG/app/build/outputs/apk/**/debug/*arm64*.apk